---
# CodeRabbit configuration
chat:
  auto_reply: true
early_access: true
reviews:
  auto_review:
    base_branches:
      - "dev*"
      - "main"
      - "master"
    drafts: false
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
  high_level_summary: true
  poem: true
  request_changes_workflow: false
  review_status: true
  tools:
    actionlint:
      enabled: true
    gitleaks:
      enabled: true
    hadolint:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
version: 1
