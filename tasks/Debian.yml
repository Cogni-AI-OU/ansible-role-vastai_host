---
- name: Validate install mode
  ansible.builtin.assert:
    that:
      - vastai_host_install_mode in ['local', 'native', 'remote']
    fail_msg: >-
      Unsupported 'vastai_host_install_mode' value '{{ vastai_host_install_mode }}'.
      Supported values: local, remote, native.
- name: Validate script run mode
  ansible.builtin.assert:
    that:
      - vastai_host_install_script_run_mode in ['daemon', 'standalone']
    fail_msg: >-
      Unsupported 'vastai_host_install_script_run_mode' value '{{ vastai_host_install_script_run_mode }}'.
      Supported values: standalone, daemon.
  when: vastai_host_install_mode in ['local', 'remote']
- name: Set effective account identity
  ansible.builtin.set_fact:
    vastai_host_account_identity_effective: '{{ vastai_host_account_identity | trim }}'
- name: Check configured template owner account
  ansible.builtin.getent:
    database: passwd
    key: '{{ vastai_host_config_template_user }}'
  register: vastai_host_config_template_user_getent
  failed_when: false
  changed_when: false
- name: Set effective template ownership
  ansible.builtin.set_fact:
    vastai_host_config_template_user_effective: >-
      {{
        vastai_host_config_template_user
        if (
          vastai_host_config_template_user_getent.ansible_facts.getent_passwd is defined
          and (vastai_host_config_template_user in vastai_host_config_template_user_getent.ansible_facts.getent_passwd)
        )
        else 'root'
      }}
    vastai_host_config_template_group_effective: >-
      {{
        vastai_host_config_template_group
        if (
          vastai_host_config_template_user_getent.ansible_facts.getent_passwd is defined
          and (vastai_host_config_template_user in vastai_host_config_template_user_getent.ansible_facts.getent_passwd)
        )
        else 'root'
      }}
- name: Set install script command arguments
  ansible.builtin.set_fact:
    vastai_host_install_command_argv: >-
      {{
        [
          vastai_host_install_python,
          vastai_host_install_script_destination,
          vastai_host_account_identity_effective,
        ]
        + (vastai_host_install_script_run_mode_args[vastai_host_install_script_run_mode] | default([], true))
        + (vastai_host_install_extra_args | default([], true))
      }}
  when: vastai_host_install_mode in ['local', 'remote']
- name: Ensure install script directory exists
  ansible.builtin.file:
    path: '{{ vastai_host_install_script_destination | ansible.builtin.dirname }}'
    state: directory
    mode: '0755'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
- name: Deploy install script from role files
  ansible.builtin.copy:
    src: '{{ vastai_host_install_location | regex_replace("^files/", "") }}'
    dest: '{{ vastai_host_install_script_destination }}'
    mode: '0755'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode == 'local'
- name: Ensure scripted mode data directory exists
  ansible.builtin.file:
    path: /var/lib/vastai_kaalia
    state: directory
    mode: '0755'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
- name: Ensure scripted mode host data subdirectory exists
  ansible.builtin.file:
    path: /var/lib/vastai_kaalia/data
    state: directory
    mode: '0755'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
- name: Download install script from remote URL
  ansible.builtin.get_url:
    url: '{{ vastai_host_install_location }}'
    dest: '{{ vastai_host_install_script_destination }}'
    mode: '0755'
    validate_certs: '{{ vastai_host_install_validate_certs }}'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode == 'remote'
- name: Deploy host port range file
  ansible.builtin.template:
    src: host_port_range.j2
    dest: /var/lib/vastai_kaalia/host_port_range
    mode: '0644'
    owner: '{{ vastai_host_config_template_user_effective }}'
    group: '{{ vastai_host_config_template_group_effective }}'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
- name: Deploy host IP address file
  ansible.builtin.template:
    src: host_ipaddr.j2
    dest: /var/lib/vastai_kaalia/host_ipaddr
    mode: '0644'
    owner: '{{ vastai_host_config_template_user_effective }}'
    group: '{{ vastai_host_config_template_group_effective }}'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - (vastai_host_config_ipaddr | trim) | length > 0
- name: Deploy vast server file
  ansible.builtin.template:
    src: vast_server.j2
    dest: /var/lib/vastai_kaalia/vast_server
    mode: '0644'
    owner: '{{ vastai_host_config_template_user_effective }}'
    group: '{{ vastai_host_config_template_group_effective }}'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
- name: Deploy environment file
  ansible.builtin.template:
    src: environment.j2
    dest: /var/lib/vastai_kaalia/environment
    mode: '0644'
    owner: '{{ vastai_host_config_template_user_effective }}'
    group: '{{ vastai_host_config_template_group_effective }}'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
- name: Unhold apt packages before installer run
  ansible.builtin.command:
    cmd: >-
      apt-mark unhold {{ vastai_host_install_unhold_package_list | join(' ') }}
  become: '{{ ansible_user_id != "root" }}'
  register: vastai_host_install_unhold_result
  changed_when: "'Canceled hold on' in vastai_host_install_unhold_result.stdout"
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_unhold_packages_before_run
    - (vastai_host_install_unhold_package_list | length) > 0
- name: Install prerequisite apt packages before installer run
  ansible.builtin.apt:
    name: '{{ vastai_host_install_prerequisite_packages }}'
    state: present
    update_cache: true
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - (vastai_host_install_prerequisite_packages | length) > 0
- name: Preflight validate Vast API key against identify endpoint
  ansible.builtin.uri:
    url: '{{ vastai_host_preflight_identify_endpoint }}'
    method: POST
    headers:
      Authorization: Bearer {{ vastai_host_account_identity_effective }}
    body_format: json
    body:
      machine_api_key: '{{ vastai_host_account_identity_effective }}'
    return_content: true
    status_code:
      - 200
      - 400
      - 422
  register: vastai_host_api_key_preflight_result
  failed_when: vastai_host_api_key_preflight_result.status in [401, 403]
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_preflight_validate_api_key
- name: Fail early when Vast API key preflight is unauthorized
  ansible.builtin.fail:
    msg: >-
      Vast API key preflight failed with unauthorized status {{ vastai_host_api_key_preflight_result.status }}
      from {{ vastai_host_preflight_identify_endpoint }}. Ensure 'vastai_host_account_identity' is a valid API
      key.
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_preflight_validate_api_key
    - vastai_host_api_key_preflight_result is defined
    - vastai_host_api_key_preflight_result.status in [401, 403]
- name: Check existing latest path type before installer run
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/latest
    follow: false
  register: vastai_host_latest_path_stat
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
- name: Remove stale non-symlink latest path before installer run
  ansible.builtin.file:
    path: /var/lib/vastai_kaalia/latest
    state: absent
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_latest_path_stat.stat.exists
    - not vastai_host_latest_path_stat.stat.islnk
- name: Ensure daemon runtime payload is managed for non-native mode before installer run
  ansible.builtin.shell: >-
    set -euo pipefail;
    latest_dir=/var/lib/vastai_kaalia/latest;
    mkdir -p "$latest_dir";
    tmp_dir=$(mktemp -d);
    trap 'rm -rf "$tmp_dir"' EXIT;
    curl -fsSL '{{ vastai_host_daemon_archive_url }}' -o "$tmp_dir/daemon.tar.gz";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./kaalia > "$latest_dir/kaalia";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./kaalia_docker_shim > "$latest_dir/kaalia_docker_shim";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./ktxt_tojson.py > "$latest_dir/ktxt_tojson.py";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./launch_kaalia.sh > "$latest_dir/launch_kaalia.sh";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./launch_metrics_pusher.sh > "$latest_dir/launch_metrics_pusher.sh";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./machine_metrics_pusher.py > "$latest_dir/machine_metrics_pusher.py";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./launch_tls.sh > "$latest_dir/launch_tls.sh";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./launch_ssh.sh > "$latest_dir/launch_ssh.sh";
    tar -xOf "$tmp_dir/daemon.tar.gz" ./apt-packages > "$latest_dir/apt-packages";
    chmod 0755 "$latest_dir/kaalia";
    chmod 0755 "$latest_dir/kaalia_docker_shim";
    chmod 0755 "$latest_dir/ktxt_tojson.py";
    chmod 0755 "$latest_dir/launch_kaalia.sh";
    chmod 0755 "$latest_dir/launch_metrics_pusher.sh";
    chmod 0755 "$latest_dir/machine_metrics_pusher.py";
    chmod 0755 "$latest_dir/launch_tls.sh";
    chmod 0755 "$latest_dir/launch_ssh.sh";
    chmod 0644 "$latest_dir/apt-packages";
    owner_user="{{ vastai_host_config_template_user_effective }}";
    owner_group="{{ vastai_host_config_template_group_effective }}";
    for daemon_file in \
      "$latest_dir/kaalia" \
      "$latest_dir/kaalia_docker_shim" \
      "$latest_dir/ktxt_tojson.py" \
      "$latest_dir/launch_kaalia.sh" \
      "$latest_dir/launch_metrics_pusher.sh" \
      "$latest_dir/machine_metrics_pusher.py" \
      "$latest_dir/launch_tls.sh" \
      "$latest_dir/launch_ssh.sh" \
      "$latest_dir/apt-packages"; do
      chown "$owner_user:$owner_group" "$daemon_file";
    done
  args:
    creates: /var/lib/vastai_kaalia/latest/machine_metrics_pusher.py
    executable: /bin/bash
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_manage_non_native_daemon_payload
- name: Run install script
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
  block:
    - name: Execute install script command
      ansible.builtin.command:
        argv: '{{ vastai_host_install_command_argv }}'
        creates: /var/lib/vastai_kaalia/.ansible_vastai_install_done
      register: vastai_host_install_run_result
      failed_when: >-
        (vastai_host_install_run_result.rc != 0)
        or ('Install failed.' in vastai_host_install_run_result.stdout)
  rescue:
    - name: Resolve installer log archive path from stdout
      ansible.builtin.set_fact:
        vastai_host_install_log_archive_path: >-
          {{
            (
              vastai_host_install_run_result.stdout
              | regex_findall('the file\s+([^\s]+vastai_install_logs\.tar\.gz)')
              | first
            )
            | default('', true)
          }}
    - name: Create temporary extraction directory
      ansible.builtin.tempfile:
        state: directory
        prefix: vastai_install_logs_
      register: vastai_host_install_log_extract_dir
      when: vastai_host_install_log_archive_path | length > 0
    - name: Extract installer log archive
      ansible.builtin.unarchive:
        src: '{{ vastai_host_install_log_archive_path }}'
        dest: '{{ vastai_host_install_log_extract_dir.path }}'
        remote_src: true
      when: vastai_host_install_log_archive_path | length > 0
    - name: Print extracted vast_host_install.log
      ansible.builtin.command:
        cmd: >-
          bash -lc 'set -e;
          f=$(find "{{ vastai_host_install_log_extract_dir.path }}" -type f -name vast_host_install.log | head
          -n 1);
          [[ -n "$f" ]];
          cat "$f"'
      register: vastai_host_install_log_output
      changed_when: false
      when: vastai_host_install_log_archive_path | length > 0
    - name: Show extracted vast_host_install.log
      ansible.builtin.debug:
        msg: '{{ vastai_host_install_log_output.stdout }}'
      when:
        - vastai_host_install_log_archive_path | length > 0
        - vastai_host_install_log_output is defined
    - name: Fail install when installer reports failure
      ansible.builtin.fail:
        msg: >-
          Vast installer failed. stdout={{ vastai_host_install_run_result.stdout | trim }}
- name: Deploy Vast.ai service unit
  ansible.builtin.template:
    src: vastai.service.j2
    dest: /etc/systemd/system/vastai.service
    mode: '0644'
    owner: root
    group: root
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_script_run_mode == 'daemon'
- name: Deploy Vast.ai metrics service unit
  ansible.builtin.template:
    src: vast_metrics.service.j2
    dest: /etc/systemd/system/vast_metrics.service
    mode: '0644'
    owner: root
    group: root
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_script_run_mode == 'daemon'
- name: Ensure Vast.ai daemon is started
  ansible.builtin.systemd:
    name: vastai
    daemon_reload: true
    enabled: true
    state: started
  become: '{{ ansible_user_id != "root" }}'
  when:
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_script_run_mode == 'daemon'
    - vastai_host_install_start_daemon
- name: Ensure Vast.ai metrics service is started
  ansible.builtin.systemd:
    name: vast_metrics
    daemon_reload: true
    enabled: true
    state: started
  become: '{{ ansible_user_id != "root" }}'
  when:
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_script_run_mode == 'daemon'
    - vastai_host_install_start_daemon
- name: Render Vast.ai managed cron file
  ansible.builtin.template:
    src: vastai_kaalia.cron.j2
    dest: '{{ vastai_host_cron_file_path }}'
    mode: '0644'
    owner: '{{ vastai_host_config_template_user_effective }}'
    group: '{{ vastai_host_config_template_group_effective }}'
  register: vastai_host_cron_template_result
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_script_run_mode == 'daemon'
    - vastai_host_manage_cron_jobs
- name: Install Vast.ai managed user crontab
  ansible.builtin.command:
    cmd: crontab -u vastai_kaalia {{ vastai_host_cron_file_path }}
  changed_when: vastai_host_cron_template_result.changed
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_script_run_mode == 'daemon'
    - vastai_host_manage_cron_jobs
- name: Mark scripted install completion
  ansible.builtin.copy:
    content: completed\n
    dest: /var/lib/vastai_kaalia/.ansible_vastai_install_done
    mode: '0644'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length > 0
    - vastai_host_install_run_result is defined
    - vastai_host_install_run_result is changed
- name: Skip install script when account identity is missing
  ansible.builtin.debug:
    msg: >-
      Skipping Vast.ai installer execution because 'vastai_host_account_identity' is empty.
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_account_identity_effective | length == 0
- name: Ensure native mode data directory exists
  ansible.builtin.file:
    path: /var/lib/vastai_kaalia
    state: directory
    mode: '0755'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native'
- name: Ensure native mode host data subdirectory exists
  ansible.builtin.file:
    path: /var/lib/vastai_kaalia/data
    state: directory
    mode: '0755'
  become: '{{ ansible_user_id != "root" }}'
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native'
- name: Include native install task graph
  ansible.builtin.include_tasks:
    apply:
      tags: vastai_host-native
    file: native/main.yml
  when:
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native'
  tags: vastai_host-native
