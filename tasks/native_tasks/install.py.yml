---
- name: Ensure docker group exists (native-tasks)
  ansible.builtin.group:
    name: docker
    state: present
- name: Ensure vastai_kaalia user exists (native-tasks)
  ansible.builtin.user:
    name: vastai_kaalia
    system: true
    shell: /bin/bash
    groups:
      - docker
    append: true
    create_home: false
    home: /var/lib/vastai_kaalia
    state: present
- name: Ensure base directories exist (native-tasks)
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop:
    - /var/lib/vastai_kaalia
    - /var/lib/vastai_kaalia/data
- name: Install baseline packages from install.py behavior (native-tasks)
  ansible.builtin.package:
    name:
      - ca-certificates
      - cron
      - curl
      - rsync
      - tshark
    state: present
