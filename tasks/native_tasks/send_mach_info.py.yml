---
- name: Ensure machine info log path exists (native-tasks)
  ansible.builtin.file:
    path: /var/lib/vastai_kaalia/data/instance_extra_logs
    state: directory
    mode: '0755'
- name: Ensure machine identity placeholder file exists (native-tasks)
  ansible.builtin.copy:
    content: '{{ vastai_host_account_identity | default("") }}\n'
    dest: /var/lib/vastai_kaalia/machine_id
    mode: '0644'
    force: false
