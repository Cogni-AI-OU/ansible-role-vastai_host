---
- name: Check machine_id file
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/machine_id
  register: vastai_host_machine_id_stat
  when:
    - ansible_facts["os_family"] == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - (vastai_host_account_identity | trim) | length > 0
- name: Check update launcher file
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/update_launcher.sh
  register: vastai_host_update_launcher_stat
  when:
    - ansible_facts["os_family"] == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - (vastai_host_account_identity | trim) | length > 0
- name: Check daemon launch script file
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/latest/launch_kaalia.sh
  register: vastai_host_daemon_launch_script_stat
  when:
    - ansible_facts["os_family"] == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_install_script_run_mode == 'daemon'
    - (vastai_host_account_identity | trim) | length > 0
- name: Check daemon metrics pusher script file
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/latest/machine_metrics_pusher.py
  register: vastai_host_daemon_metrics_pusher_stat
  when:
    - ansible_facts["os_family"] == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_install_script_run_mode == 'daemon'
    - (vastai_host_account_identity | trim) | length > 0
- name: Check daemon metrics launcher script file
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/latest/launch_metrics_pusher.sh
  register: vastai_host_daemon_metrics_launcher_stat
  when:
    - ansible_facts["os_family"] == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_install_script_run_mode == 'daemon'
    - (vastai_host_account_identity | trim) | length > 0
- name: Check deployed install script
  ansible.builtin.stat:
    path: '{{ vastai_host_install_script_destination }}'
  register: vastai_host_install_script_stat
  when:
    - ansible_facts["os_family"] == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
- name: Check native completion marker
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/native_install_done
  register: vastai_host_native_marker_stat
  when:
    - ansible_facts["os_family"] == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native'
- name: Assert scripted install artifacts
  ansible.builtin.assert:
    that:
      - vastai_host_install_script_stat.stat.exists
    fail_msg: Scripted Vast.ai install did not deploy the installer script.
  when:
    - ansible_facts["os_family"] == 'Debian'
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
- name: Assert daemon launch script artifact
  ansible.builtin.assert:
    that:
      - vastai_host_daemon_launch_script_stat.stat.exists
    fail_msg: Scripted daemon install did not deploy latest/launch_kaalia.sh.
  when:
    - ansible_facts["os_family"] == 'Debian'
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_install_script_run_mode == 'daemon'
    - (vastai_host_account_identity | trim) | length > 0
- name: Assert daemon metrics pusher script artifact
  ansible.builtin.assert:
    that:
      - vastai_host_daemon_metrics_pusher_stat.stat.exists
    fail_msg: Scripted daemon install did not deploy latest/machine_metrics_pusher.py.
  when:
    - ansible_facts["os_family"] == 'Debian'
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_install_script_run_mode == 'daemon'
    - (vastai_host_account_identity | trim) | length > 0
- name: Assert daemon metrics launcher script artifact
  ansible.builtin.assert:
    that:
      - vastai_host_daemon_metrics_launcher_stat.stat.exists
      - vastai_host_daemon_metrics_launcher_stat.stat.executable
    fail_msg: Scripted daemon install did not deploy executable latest/launch_metrics_pusher.sh.
  when:
    - ansible_facts["os_family"] == 'Debian'
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - vastai_host_install_script_run_mode == 'daemon'
    - (vastai_host_account_identity | trim) | length > 0
- name: Assert native completion marker
  ansible.builtin.assert:
    that:
      - vastai_host_native_marker_stat.stat.exists
    fail_msg: Native mode did not create its completion marker file.
  when:
    - ansible_facts["os_family"] == 'Debian'
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native'
