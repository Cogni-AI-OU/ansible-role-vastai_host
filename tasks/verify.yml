---
- name: Check machine_id file
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/machine_id
  register: vastai_host_machine_id_stat
  when:
    - ansible_os_family == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - (vastai_host_account_identity | trim) | length > 0
- name: Check update launcher file
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/update_launcher.sh
  register: vastai_host_update_launcher_stat
  when:
    - ansible_os_family == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
    - (vastai_host_account_identity | trim) | length > 0
- name: Check deployed install script
  ansible.builtin.stat:
    path: '{{ vastai_host_install_script_destination }}'
  register: vastai_host_install_script_stat
  when:
    - ansible_os_family == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
- name: Check native completion marker
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/native_install_done
  register: vastai_host_native_marker_stat
  when:
    - ansible_os_family == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native'
- name: Check native-tasks completion marker
  ansible.builtin.stat:
    path: /var/lib/vastai_kaalia/native_tasks_install_done
  register: vastai_host_native_tasks_marker_stat
  when:
    - ansible_os_family == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native-tasks'
- name: Assert scripted install artifacts
  ansible.builtin.assert:
    that:
      - vastai_host_install_script_stat.stat.exists
    fail_msg: Scripted Vast.ai install did not deploy the installer script.
  when:
    - ansible_os_family == 'Debian'
    - vastai_host_install_execute
    - vastai_host_install_mode in ['local', 'remote']
- name: Assert native completion marker
  ansible.builtin.assert:
    that:
      - vastai_host_native_marker_stat.stat.exists
    fail_msg: Native mode did not create its completion marker file.
  when:
    - ansible_os_family == 'Debian'
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native'
- name: Assert native-tasks completion marker
  ansible.builtin.assert:
    that:
      - vastai_host_native_tasks_marker_stat.stat.exists
    fail_msg: Native-tasks mode did not create its completion marker file.
  when:
    - ansible_os_family == 'Debian'
    - not ansible_check_mode
    - vastai_host_install_execute
    - vastai_host_install_mode == 'native-tasks'
