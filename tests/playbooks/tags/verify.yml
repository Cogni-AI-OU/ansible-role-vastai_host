---
- name: Ensure Docker containers are up-and-running
  gather_facts: false
  hosts: docker_containers
  pre_tasks:
    - name: Ensure requests is installed on controller
      ansible.builtin.pip:
        name: requests
        state: present
        executable: '{{ controller_pip }}'
      delegate_to: localhost
      run_once: true  # noqa: run-once[task]
    - name: Pull container image
      ansible.builtin.command:
        argv:
          - docker
          - pull
          - '{{ container_image }}'
      changed_when: true
      delegate_to: localhost
    - name: Remove existing container if present
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - --force
          - '{{ inventory_hostname }}'
      changed_when: remove_container_result.rc == 0
      delegate_to: localhost
      failed_when: false
      register: remove_container_result
    - name: Start test container
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --detach
          - --name
          - '{{ inventory_hostname }}'
          - '{{ container_image }}'
          - sleep
          - infinity
      changed_when: true
      delegate_to: localhost
    - name: Wait for container to be ready
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - --format
          - '{{ "{{.State.Running}}" }}'
          - '{{ inventory_hostname }}'
      register: container_info
      until:
        - container_info is defined
        - container_info.stdout is defined
        - container_info.stdout | trim == 'true'
      delegate_to: localhost
      changed_when: false
    - name: Check if Python 3 exists on Ubuntu/Debian
      ansible.builtin.raw: test -e "{{ ansible_python_interpreter }}"
      register: python_exists_debian
      failed_when: false
      changed_when: false
      when: container_image is search('ubuntu') or container_image is search('debian')
    - name: Install Python 3 on Ubuntu/Debian
      ansible.builtin.raw: apt-get update && apt-get install -y python3 python3-pip
      changed_when: true
      when:
        - container_image is search('ubuntu') or container_image is search('debian')
        - python_exists_debian.rc != 0
  tags: always
  vars:
    container_image_map:
      vastai-host-on-debian-latest: debian:latest
      vastai-host-on-ubuntu-jammy: ubuntu:jammy
      vastai-host-on-ubuntu-latest: ubuntu:latest
      vastai-host-on-ubuntu-noble: ubuntu:noble
    container_image: "{{ container_image_map[inventory_hostname] | default('ubuntu:latest') }}"
  vars_files:
    - ../../vars/main.yml
- name: Import cogni-ai.vastai_host role (verify tag)
  hosts: docker_containers
  gather_facts: true
  tasks:
    - name: Import cogni-ai.vastai_host role
      ansible.builtin.import_role:
        name: cogni-ai.vastai_host
  tags: verify
  post_tasks:
    - name: Stop Docker containers
      ansible.builtin.command:
        argv:
          - docker
          - stop
          - '{{ inventory_hostname }}'
      changed_when: stop_container_result.rc == 0
      delegate_to: localhost
      failed_when: false
      register: stop_container_result
