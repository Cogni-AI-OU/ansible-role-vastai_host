---
vastai_host_account_identity: >-
  {{
    lookup("ansible.builtin.env", "VASTAI_API_KEY")
    | default("", true)
  }}
vastai_host_install_execute: true
vastai_host_install_extra_args:
  - --no-driver  # Assume nvidia driver is installed.
  - --no-libvirt # Assume libvirt is configured.
vastai_host_install_location: files/vast.ai/vast_host_installer.py
vastai_host_install_mode: local
vastai_host_config_ipaddr: ''
vastai_host_config_port_range: '11000-11999'
vastai_host_config_vast_server: 'https://elb-internal-nocache.vast.ai'
vastai_host_config_environment_vast_server: 'https://elb-internal-nocache.vast.ai'
vastai_host_install_python: python3
vastai_host_install_script_destination: /var/lib/vastai_kaalia/vast_host_installer.py
vastai_host_install_script_run_mode: standalone
vastai_host_install_script_run_mode_args:
  daemon:
    - --no-docker  # Don't run vast.ai daemon installer.
  standalone:
    - --no-daemon  # Don't run vast.ai daemon installer.
vastai_host_install_validate_certs: true
